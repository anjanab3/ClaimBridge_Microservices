#Application properties for Policy Service
spring.application.name = policy
server.port = 9091

#Datasource configuration
spring.datasource.url = jdbc:mysql://localhost:3306/policy
spring.datasource.username = root
spring.datasource.password = root
spring.datasource.driver-class-name = com.mysql.cj.jdbc.Driver

#JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto = update
spring.jpa.show-sql = true
spring.jpa.database-platform = org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.naming.physical-strategy = org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

#Swagger/OpenAPI configuration
springdoc.swagger-ui.path = /swagger-ui.html
springdoc.api-docs.path = /v3/api-docs

#Eureka client configuration
eureka.client.service-url.defaultZone = http://localhost:8761/eureka/
eureka.instance.prefer-ip-address = true

#Allow bean definition overriding (useful for testing and certain configurations)
spring.main.allow-bean-definition-overriding = true